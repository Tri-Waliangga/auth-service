services:
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: auth-service:local
    container_name: auth-service
    restart: unless-stopped
    depends_on:
      auth-mysql:
        condition: service_healthy
    ports:
      - "${AUTH_SERVICE_PORT:-3031}:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      AUTH_DB_URL: jdbc:mysql://auth-mysql:3306/${MYSQL_DATABASE:-auth_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true
      AUTH_DB_USERNAME: ${MYSQL_USER:-auth_user}
      AUTH_DB_PASSWORD: ${MYSQL_PASSWORD:-change-this-auth-password}
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-auth-service}
      AUTH_JWT_PRIVATE_KEY: ${AUTH_JWT_PRIVATE_KEY:?AUTH_JWT_PRIVATE_KEY is required}
      AUTH_JWT_PUBLIC_KEY: ${AUTH_JWT_PUBLIC_KEY:?AUTH_JWT_PUBLIC_KEY is required}
      AUTH_JWT_DEFAULT_TOKEN_TTL_SECONDS: ${AUTH_JWT_DEFAULT_TOKEN_TTL_SECONDS:-900}
      AUTH_INTERNAL_API_KEY: ${AUTH_INTERNAL_API_KEY:-change-this-internal-api-key}
      JAVA_OPTS: ${JAVA_OPTS:-}

  auth-mysql:
    image: mysql:8.0
    container_name: auth-mysql
    restart: unless-stopped
    ports:
      - "${AUTH_MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    volumes:
      - auth-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: auth-prometheus
    restart: unless-stopped
    depends_on:
      - auth-service
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - auth-prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  grafana:
    image: grafana/grafana:12.1.1
    container_name: auth-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    volumes:
      - auth-grafana-data:/var/lib/grafana

volumes:
  auth-mysql-data:
  auth-prometheus-data:
  auth-grafana-data:
