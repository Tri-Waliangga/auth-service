spring:
  application:
    name: ${APP_NAME:auth-service}
  datasource:
    url: ${AUTH_DB_URL:jdbc:mysql://localhost:3307/auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true}
    username: ${AUTH_DB_USERNAME:auth_service}
    password: ${AUTH_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${AUTH_JPA_DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        format_sql: ${AUTH_JPA_FORMAT_SQL:false}
  flyway:
    enabled: ${AUTH_FLYWAY_ENABLED:true}
    locations: ${AUTH_FLYWAY_LOCATIONS:classpath:db/migration}
    clean-disabled: ${AUTH_FLYWAY_CLEAN_DISABLED:true}
    validate-on-migrate: ${AUTH_FLYWAY_VALIDATE_ON_MIGRATE:true}

server:
  port: ${AUTH_SERVICE_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics,prometheus}
  endpoint:
    health:
      access: ${MANAGEMENT_ENDPOINT_HEALTH_ACCESS:unrestricted}
      probes:
        enabled: ${MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED:true}
    prometheus:
      access: ${MANAGEMENT_ENDPOINT_PROMETHEUS_ACCESS:unrestricted}
  prometheus:
    metrics:
      export:
        enabled: ${MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED:true}
  metrics:
    tags:
      application: ${APP_NAME:auth-service}

springdoc:
  api-docs:
    path: ${SPRINGDOC_API_DOCS_PATH:/v3/api-docs}
  swagger-ui:
    path: ${SPRINGDOC_SWAGGER_UI_PATH:/swagger-ui.html}

auth:
  jwt:
    issuer: ${AUTH_JWT_ISSUER:auth-service}
    private-key: ${AUTH_JWT_PRIVATE_KEY:}
    public-key: ${AUTH_JWT_PUBLIC_KEY:}
    default-token-ttl-seconds: ${AUTH_JWT_DEFAULT_TOKEN_TTL_SECONDS:900}
  internal:
    api-key: ${AUTH_INTERNAL_API_KEY:}
